version: '3.8'

services:
  db:
    image: postgres:15
    container_name: ids_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: yourpassword
      POSTGRES_DB: ids_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: ids_app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "8501:8501"
    # Required for live packet capture
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW

volumes:
  pgdata:
